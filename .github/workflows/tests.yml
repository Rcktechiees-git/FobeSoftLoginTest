ame: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: browser-actions/setup-chrome@v1
      - run: chrome --version
      - run: mvn -q -Dheadless=true test
